<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#e0457b"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>Happy Women's Day 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <!-- model-viewer CDN -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <link rel="stylesheet" href="src/css/base.css"/>
  <link rel="stylesheet" href="src/css/layer1.css"/>
  <link rel="stylesheet" href="src/css/layer2.css"/>
</head>
<body>

  <!-- ═══════════ LAYER 1: Envelope Scene ═══════════ -->
  <div id="layer1" class="layer active">
    <div class="l1-bg"><div class="hearts-bg" id="heartsBg"></div></div>
    <div class="l1-center">
      <p class="l1-hint">
        <i class="bi bi-stars" style="color:#ffdf80"></i>
        Nhấn vào phong bì để mở
        <i class="bi bi-stars" style="color:#ffdf80"></i>
      </p>
      <div class="envelope-wrap" id="envelopeWrap">
        <div class="envelope" id="envelope">
          <div class="env-back"></div>
          <div class="env-flap" id="envFlap"></div>
          <div class="env-body">
            <div class="env-seal" id="envSeal"><i class="bi bi-envelope-heart-fill"></i></div>
          </div>
          <div class="env-side env-side-left"></div>
          <div class="env-side env-side-right"></div>
          <div class="env-bottom"></div>
          <div class="env-letter" id="envLetter">
            <div class="letter-content">
              <p class="letter-greeting"><i class="bi bi-flower1"></i> Chao xìn! <i class="bi bi-flower1"></i></p>
              <p>Nhấp vào để tiếp tục <i class="bi bi-arrow-right-circle-fill"></i></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════ TRANSITION OVERLAY ═══════════ -->
  <div class="transition-overlay" id="transOverlay">
    <div class="transition-petals" id="transPetals"></div>
    <div class="transition-text">Happy Women's Day <i class="bi bi-flower3"></i></div>
  </div>

  <!-- ═══════════ LAYER 2: 3D Lily + Game + Chat ═══════════ -->
  <div id="layer2" class="layer">

    <!-- Hoa Lily 3D (model-viewer, hiện từ dưới lên) -->
    <div id="lilyViewerWrap">
      <!-- model-viewer được tạo bởi layer2-3d.js -->
    </div>

    <!-- Lời chúc (fade in sau khi hoa lên xong) -->
    <div id="lilyMessage">
      <p><strong>Chúc mừng ngày 8/3! <i class="bi bi-flower3"></i></strong></p>
    </div>

    <!-- Hoa lá rơi -->
    <div id="fallingPetals"></div>
    </div>

    <!-- Chat bubbles -->
    <div id="chatBubbles"></div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="src/js/utils.js"></script>
  <script src="src/js/layer1.js"></script>
  <script src="src/js/layer2-3d.js"></script>
  <script src="src/js/layer2-chat.js"></script>
  <script src="src/js/main.js"></script>
</body>
</html>
